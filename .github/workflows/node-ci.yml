name: Node.js CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.changes.outputs.workspaces }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4

      - id: changes
        uses: ./.github/actions/detect-changes

  format:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: "24.10.0"

      - name: Check formatting
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run format --workspace "$ws"
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  lint:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

      - name: Run linter
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run lint --workspace "$ws"
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  build:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

      - name: Run build
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run build --workspace "$ws" --if-present
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  test:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

      - name: Run unit tests
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run test:unit --workspace "$ws" --if-present
            echo "::endgroup::"
          done < /tmp/workspaces.txt

      - name: Code Coverage Report - Base Fastify Server
        if: contains(needs.changes.outputs.workspaces, 'libs/base-fastify-server')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Base Fastify Server"
          filename: "./libs/base-fastify-server/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Session Manager
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Session Manager"
          filename: "./apps/session-manager/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Node Server
        if: contains(needs.changes.outputs.workspaces, 'apps/node-server')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Node Server"
          filename: "./apps/node-server/coverage/cobertura-coverage.xml"

  check-database-types:
    needs: changes
    if: contains(needs.changes.outputs.workspaces, 'infra/scribear-db')
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

      - name: Build and start custom database
        run: |
          docker build -t scribear-db ./infra/scribear-db
          docker run -d --name scribear-db \
            -e POSTGRES_DB=scribear-db \
            -e POSTGRES_USER=scribear \
            -e POSTGRES_PASSWORD=scribear \
            -p 5432:5432 \
            scribear-db \
            postgres -c shared_preload_libraries=pg_cron -c cron.database_name=scribear-db

      - name: Wait for database to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec scribear-db pg_isready -U scribear -d scribear-db; then
              exit 0
            fi
            sleep 1
          done
          echo "Database failed to start" && exit 1

      - name: Run build
        working-directory: "./infra/scribear-db"
        run: npm run build

      - name: Run migrations
        working-directory: "./infra/scribear-db"
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scribear-db
          DB_USER: scribear
          DB_PASSWORD: scribear
        run: npm run migrate:up

      - name: Generate database types
        working-directory: "./infra/scribear-db"
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scribear-db
          DB_USER: scribear
          DB_PASSWORD: scribear
        run: npm run generate:types

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code infra/scribear-db/src/database.types.ts || \
          (echo "Error: Generated database types are out of date. Run 'npm run generate:types' in infra/scribear-db and commit the changes." && exit 1)

  deploy-standalone-webapp:
    needs:
      - changes
      - format
      - lint
      - build
    if: contains(needs.changes.outputs.workspaces, 'apps/standalone-webapp') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

      - name: Run build
        run: npm run build --workspace @scribear/standalone-webapp

      - name: Label build date and commit hash
        run: |
          date > apps/standalone-webapp/dist/builddate.txt
          git rev-parse --short HEAD > apps/standalone-webapp/dist/commit.txt

      - name: Deploy to Production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_2026 }}
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${DEPLOY_KEY}"
          git clone git@github.com:scribear/v.git
          git config --global user.email "angrave@illinois.edu"
          git config --global user.name "scribear-bot"
          cd v
          ls -la
          export SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`

          git rm -rf latest-v2
          git commit -m "Removing previous latest dir"

          mkdir -p latest-v2
          mv ../apps/standalone-webapp/dist/* latest-v2
          git add latest-v2

          git commit -m "Commit Deploy: ${SHORT_SHA}"
          git push origin master
