name: Node.js CI

on:
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.changes.outputs.workspaces }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Changed Workspaces
        id: changes
        uses: ./.github/actions/detect-changes

  format:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Check formatting
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run format --workspace "$ws"
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  lint:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run linter
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run lint --workspace "$ws"
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  build:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run build
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run build --workspace "$ws" --if-present
            echo "::endgroup::"
          done < /tmp/workspaces.txt

  test:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run unit tests
        env:
          WORKSPACES: ${{ needs.changes.outputs.workspaces }}
        run: |
          node -e "process.stdout.write(JSON.parse(process.env.WORKSPACES).join('\n'))" > /tmp/workspaces.txt
          while IFS= read -r ws; do
            echo "::group::$ws"
            npm run test:unit --workspace "$ws" --if-present
            echo "::endgroup::"
          done < /tmp/workspaces.txt

      - name: Code Coverage Report - Base Fastify Server Unit Tests
        if: contains(needs.changes.outputs.workspaces, 'libs/base-fastify-server')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Base Fastify Server - Unit Tests"
          filename: "./libs/base-fastify-server/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Session Manager Unit Tests
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Session Manager - Unit Tests"
          filename: "./apps/session-manager/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Node Server Unit Tests
        if: contains(needs.changes.outputs.workspaces, 'apps/node-server')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Node Server - Unit Tests"
          filename: "./apps/node-server/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Base API Client Unit Tests
        if: contains(needs.changes.outputs.workspaces, 'libs/clients/base-api-client')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Base API Client - Unit Tests"
          filename: "./libs/clients/base-api-client/coverage/cobertura-coverage.xml"

      - name: Code Coverage Report - Base WebSocket Client Unit Tests
        if: contains(needs.changes.outputs.workspaces, 'libs/clients/base-websocket-client')
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Base WebSocket Client - Unit Tests"
          filename: "./libs/clients/base-websocket-client/coverage/cobertura-coverage.xml"

  docker-build:
    needs: [changes, format, lint, build, test]
    if: needs.changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: scribear/scribear-db
            build_context: infra/scribear-db
            dockerfile: infra/scribear-db/Dockerfile
            workspace: infra/scribear-db
            version_file: infra/scribear-db/package.json
          - image_name: scribear/client-webapp
            build_context: .
            dockerfile: apps/client-webapp/Dockerfile
            workspace: apps/client-webapp
            version_file: apps/client-webapp/package.json
          - image_name: scribear/kiosk-webapp
            build_context: .
            dockerfile: apps/kiosk-webapp/Dockerfile
            workspace: apps/kiosk-webapp
            version_file: apps/kiosk-webapp/package.json
          - image_name: scribear/standalone-webapp
            build_context: .
            dockerfile: apps/standalone-webapp/Dockerfile
            workspace: apps/standalone-webapp
            version_file: apps/standalone-webapp/package.json
          - image_name: scribear/session-manager
            build_context: .
            dockerfile: apps/session-manager/Dockerfile
            workspace: apps/session-manager
            version_file: apps/session-manager/package.json
          - image_name: scribear/node-server
            build_context: .
            dockerfile: apps/node-server/Dockerfile
            workspace: apps/node-server
            version_file: apps/node-server/package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        uses: ./.github/actions/resolve-container-tags
        with:
          version_file: ${{ matrix.version_file }}

      - name: Build Container
        if: contains(needs.changes.outputs.workspaces, matrix.workspace)
        uses: ./.github/actions/build-container
        with:
          image_name: ${{ matrix.image_name }}
          build_context: ${{ matrix.build_context }}
          dockerfile: ${{ matrix.dockerfile }}
          cache_variant: pr
          custom_tags: ${{ steps.tags.outputs.tags }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  integration-test:
    needs: [changes, format, lint, build, test, docker-build]
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Prepare Scribear DB Container
        uses: ./.github/actions/prepare-test-container
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        with:
          image_name: scribear/scribear-db
          build_context: ./infra/scribear-db
          dockerfile: infra/scribear-db/Dockerfile

      - name: Run Session Manager Integration Tests
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        env:
          SCRIBEAR_DB_IMAGE: scribear/scribear-db:test
        run: npm run test:integration --workspace apps/session-manager

      - name: Code Coverage Report - Session Manager Integration Tests
        uses: ./.github/actions/coverage-report
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        with:
          package_name: "Session Manager - Integration Tests"
          filename: "./apps/session-manager/coverage/cobertura-coverage.xml"

      - name: Prepare Transcription Service CPU Container
        uses: ./.github/actions/prepare-test-container
        if: contains(needs.changes.outputs.workspaces, 'apps/node-server')
        with:
          image_name: scribear/transcription-service-cpu
          build_context: ./transcription_service
          dockerfile: ./transcription_service/Dockerfile_CPU

      - name: Run Node Server Integration Tests
        if: contains(needs.changes.outputs.workspaces, 'apps/node-server')
        env:
          TRANSCRIPTION_SERVICE_IMAGE: scribear/transcription-service-cpu:test
        run: npm run test:integration --workspace apps/node-server

      - name: Code Coverage Report - Node Server Integration Tests
        uses: ./.github/actions/coverage-report
        if: contains(needs.changes.outputs.workspaces, 'apps/node-server')
        with:
          package_name: "Node Server - Integration Tests"
          filename: "./apps/node-server/coverage/cobertura-coverage.xml"

  check-database-types:
    needs: [changes, docker-build]
    if: contains(needs.changes.outputs.workspaces, 'infra/scribear-db')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Prepare Scribear DB Container
        uses: ./.github/actions/prepare-test-container
        if: contains(needs.changes.outputs.workspaces, 'apps/session-manager')
        with:
          image_name: scribear/scribear-db
          build_context: ./infra/scribear-db
          dockerfile: infra/scribear-db/Dockerfile

      - name: Start ScribeAR DB
        run: |
          docker run -d --name scribear-db \
            -e POSTGRES_DB=scribear-db-test \
            -e POSTGRES_USER=scribear \
            -e POSTGRES_PASSWORD=scribear \
            -p 5432:5432 \
            scribear/scribear-db:test

      - name: Wait for database to be ready
        run: |
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' scribear-db)" = "healthy" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "Database failed to start" && exit 1

      - name: Run build
        working-directory: ./infra/scribear-db
        run: npm run build

      - name: Run migrations
        working-directory: ./infra/scribear-db
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scribear-db-test
          DB_USER: scribear
          DB_PASSWORD: scribear
        run: npm run migrate:up

      - name: Generate database types
        working-directory: "./infra/scribear-db"
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: scribear-db-test
          DB_USER: scribear
          DB_PASSWORD: scribear
        run: npm run generate:types

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code infra/scribear-db/src/database.types.ts || \
          (echo "Error: Generated database types are out of date. Run 'npm run generate:types' in infra/scribear-db and commit the changes." && exit 1)

  node-ci:
    needs: [format, lint, build, test, docker-build, integration-test, check-database-types]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check All Jobs Pass
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
