name: Python CI

on:
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      transcription_service: ${{ steps.filter.outputs.transcription_service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            transcription_service:
              - 'transcription_service/**'

  format:
    needs: changes
    if: needs.changes.outputs.transcription_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Check formatting
        working-directory: "transcription_service"
        run: make format

  lint:
    needs: changes
    if: needs.changes.outputs.transcription_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Run linter
        working-directory: "transcription_service"
        run: make lint

  test:
    needs: changes
    if: needs.changes.outputs.transcription_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Run unit tests
        working-directory: "transcription_service"
        run: make test_unit

      - name: Code Coverage Report - Transcription Service Unit Tests
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Transcription Service - Unit Tests"
          filename: "./transcription_service/coverage.xml"

  docker-build:
    needs: [changes, format, lint, test]
    if: needs.changes.outputs.transcription_service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: scribear/transcription-service-cpu
            build_context: transcription_service
            dockerfile: transcription_service/Dockerfile_CPU
            version_file: transcription_service/pyproject.toml
          - image_name: scribear/transcription-service-cuda
            build_context: transcription_service
            dockerfile: transcription_service/Dockerfile_CUDA
            version_file: transcription_service/pyproject.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        uses: ./.github/actions/resolve-container-tags
        with:
          version_file: ${{ matrix.version_file }}

      - name: Build Container
        uses: ./.github/actions/build-container
        with:
          image_name: ${{ matrix.image_name }}
          build_context: ${{ matrix.build_context }}
          dockerfile: ${{ matrix.dockerfile }}
          cache_variant: pr
          custom_tags: ${{ steps.tags.outputs.tags }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  integration-test:
    needs: [changes, format, lint, test, docker-build]
    if: needs.changes.outputs.transcription_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Run Transcription Service Integration Tests
        working-directory: "transcription_service"
        run: make test_integration

      - name: Code Coverage Report - Transcription Service Integration Tests
        uses: ./.github/actions/coverage-report
        with:
          package_name: "Transcription Service - Integration Tests"
          filename: "./transcription_service/coverage.xml"

  ci:
    needs: [format, lint, test, docker-build, integration-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check All Jobs Pass
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
