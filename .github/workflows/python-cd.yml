name: Python CD

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      transcription_service: ${{ steps.filter.outputs.transcription_service }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            transcription_service:
              - 'transcription_service/**'

  docker-build:
    needs: changes
    if: needs.changes.outputs.transcription_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Transcription Service CPU Container
        uses: ./.github/actions/build-container
        with:
          image_name: scribear/transcription-service-cpu
          build_context: transcription_service
          dockerfile: transcription_service/Dockerfile_CPU
          cache_variant: ${{ github.ref_name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Transcription Service CUDA Container
        uses: ./.github/actions/build-container
        with:
          image_name: scribear/transcription-service-cuda
          build_context: transcription_service
          dockerfile: transcription_service/Dockerfile_CUDA
          cache_variant: ${{ github.ref_name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_PASSWORD }}
